[tool:pytest]
testpaths = ["backend/tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers --tb=short"
markers =
  unit: Unit tests
  integration: Integration tests
  e2e: End-to-end tests
filterwarnings =
  ignore::DeprecationWarning
