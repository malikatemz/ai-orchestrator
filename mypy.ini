[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
  "migrations/",
  ".venv/",
  "node_modules/",
  ".next/"
]

[[tool.mypy.overrides]]
module = [
  "celery.*",
  "sqlalchemy.*",
  "fastapi.*",
  "redis.*",
]
ignore_missing_imports = true
