version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - redis
      - db
    environment:
      APP_MODE: development
      AUTO_SEED_DEMO: "true"
      PUBLIC_DEMO_MODE: "true"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://user:password@db:5432/ai_db
      ALLOWED_ORIGINS: http://localhost:3000
      PUBLIC_APP_URL: http://localhost:3000
      PUBLIC_API_URL: http://localhost:8000
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: celery -A app.worker.celery worker --loglevel=info -Q high_priority,default,low_cost
    depends_on:
      - redis
      - db
    environment:
      APP_MODE: development
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://user:password@db:5432/ai_db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
