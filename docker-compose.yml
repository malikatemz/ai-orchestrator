version: '3.9'
services:
  redis:
    image: redis:alpine
    ports:
      - 6379:6379

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_db
    ports:
      - 5432:5432

  backend:
    build: ./backend
    depends_on:
      - redis
      - db
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://user:password@db:5432/ai_db
    ports:
      - 8000:8000

  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    ports:
      - 3000:3000