---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-frontend
  namespace: orchestrator-prod
  labels:
    app: orchestrator-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orchestrator-frontend
  template:
    metadata:
      labels:
        app: orchestrator-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/{ORG}/orchestrator-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: API_BASE_URL
          value: "https://{API_DOMAIN}/api"
        - name: APP_BASE_URL
          value: "https://{APP_DOMAIN}"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-frontend
  namespace: orchestrator-prod
spec:
  type: ClusterIP
  selector:
    app: orchestrator-frontend
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
