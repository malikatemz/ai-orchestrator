---
# ConfigMap for AI Orchestrator Application Configuration
# Contains all non-sensitive configuration that can be changed without rebuilding containers
# Environment-specific values should be overridden per namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-orchestrator-config
  namespace: ai-orchestrator-prod
  labels:
    app: ai-orchestrator
    component: config
    type: configuration
  annotations:
    description: "Application configuration for AI Orchestrator"
    version: "1.0.0"
data:
  # Application environment
  ENVIRONMENT: "staging"
  
  # Logging configuration
  LOG_LEVEL: "info"
  
  # API configuration
  API_TITLE: "AI Orchestrator"
  API_VERSION: "1.0.0"
  API_DESCRIPTION: "Enterprise AI service orchestration platform"
  
  # CORS configuration (comma-separated origins)
  CORS_ORIGINS: "http://localhost:3000,https://yourdomain.com,https://api.yourdomain.com"
  
  # Database configuration
  DATABASE_POOL_SIZE: "20"
  DATABASE_POOL_RECYCLE: "3600"
  DATABASE_POOL_PRE_PING: "true"
  DATABASE_ECHO_POOL: "false"
  DATABASE_ISOLATION_LEVEL: "READ_COMMITTED"
  
  # Redis cache configuration
  REDIS_POOL_SIZE: "10"
  REDIS_MAX_CONNECTIONS: "50"
  REDIS_SOCKET_CONNECT_TIMEOUT: "5"
  REDIS_SOCKET_TIMEOUT: "5"
  
  # JWT configuration
  JWT_EXPIRATION_HOURS: "24"
  JWT_REFRESH_EXPIRATION_DAYS: "30"
  JWT_ALGORITHM: "HS256"
  
  # Worker configuration
  WORKER_CONCURRENCY: "4"
  WORKER_PREFETCH_MULTIPLIER: "4"
  WORKER_MAX_TASKS_PER_CHILD: "1000"
  WORKER_TASK_SOFT_TIME_LIMIT: "600"
  WORKER_TASK_TIME_LIMIT: "900"
  
  # Rate limiting
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_PERIOD: "60"
  RATE_LIMIT_ENABLED: "true"
  
  # Provider configuration defaults
  OPENAI_TIMEOUT: "30"
  ANTHROPIC_TIMEOUT: "30"
  
  # Monitoring and observability
  METRICS_ENABLED: "true"
  PROMETHEUS_PORT: "8000"
  PROMETHEUS_ENDPOINT: "/metrics"
  
  # Health check configuration
  HEALTH_CHECK_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  
  # Feature flags
  ENABLE_AUDIT_LOGGING: "true"
  ENABLE_REQUEST_TRACING: "true"
  ENABLE_PERFORMANCE_MONITORING: "true"
  
  # Celery configuration (multiline)
  celery-config.conf: |
    # Celery broker and result backend configuration
    broker_url = ${CELERY_BROKER_URL}
    result_backend = ${CELERY_RESULT_BACKEND}
    
    # Task configuration
    task_serializer = json
    result_serializer = json
    accept_content = ['json']
    timezone = 'UTC'
    enable_utc = True
    
    # Task routing
    task_routes = {
        'app.worker.tasks.process_request': {'queue': 'default'},
        'app.worker.tasks.process_ai_request': {'queue': 'ai_tasks'},
        'app.worker.tasks.cleanup': {'queue': 'maintenance'},
    }
    
    # Result backend configuration
    result_expires = 3600
    result_compression = 'gzip'
    
    # Worker configuration
    worker_prefetch_multiplier = 4
    worker_max_tasks_per_child = 1000
    
    # Task execution
    task_soft_time_limit = 600
    task_time_limit = 900
    task_acks_late = True
    task_reject_on_worker_lost = True
    
    # Tracking configuration
    task_track_started = True
    task_send_sent_event = True
    
    # Error handling
    task_autoretry_for = (Exception,)
    task_max_retries = 3
    task_default_retry_delay = 60
  
  # Database migration settings
  ALEMBIC_AUTO_GENERATE: "true"
  ALEMBIC_COMPARE_TYPE: "true"
  ALEMBIC_COMPARE_SERVER_DEFAULT: "true"
  
  # Security settings
  ALLOWED_HOSTS: "localhost,127.0.0.1,yourdomain.com,api.yourdomain.com"
  SECURE_HSTS_SECONDS: "31536000"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
  SECURE_HSTS_PRELOAD: "true"
  SECURE_SSL_REDIRECT: "true"
  SESSION_COOKIE_SECURE: "true"
  SESSION_COOKIE_HTTPONLY: "true"
  SESSION_COOKIE_SAMESITE: "Lax"
  
  # Backup settings
  BACKUP_ENABLED: "true"
  BACKUP_SCHEDULE: "0 2 * * *"
  BACKUP_RETENTION_DAYS: "30"
  
  # Audit settings
  AUDIT_LOG_ENABLED: "true"
  AUDIT_LOG_RETENTION_DAYS: "365"
  AUDIT_LOG_SENSITIVE_FIELDS: "password,token,secret,api_key"
