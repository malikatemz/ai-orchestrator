---
# Kubernetes Ingress for AI Orchestrator
# Provides external access to the API with TLS termination
# Requires: NGINX Ingress Controller and cert-manager
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-orchestrator-ingress
  namespace: ai-orchestrator-prod
  labels:
    app: ai-orchestrator
    component: ingress
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    
    # TLS annotations
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Requested-With"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    
    # Buffer settings for large requests
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    
    # URL rewrite
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Logging
    nginx.ingress.kubernetes.io/enable-access-log: "true"
    
spec:
  # TLS configuration
  tls:
  - hosts:
    - api.yourdomain.com
    - yourdomain.com
    secretName: ai-orchestrator-tls
  
  # Ingress rules
  rules:
  # Rule for API subdomain
  - host: api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-orchestrator-api
            port:
              number: 8000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ai-orchestrator-api
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: ai-orchestrator-api
            port:
              number: 8000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: ai-orchestrator-api
            port:
              number: 8000
  
  # Rule for main domain
  - host: yourdomain.com
    http:
      paths:
      # Frontend (if deployed)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
      # API proxy
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ai-orchestrator-api
            port:
              number: 8000
---
# Certificate Issuer for Let's Encrypt
# Install cert-manager first: https://cert-manager.io/docs/installation/
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app: ai-orchestrator
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    # HTTP-01 challenge
    - http01:
        ingress:
          class: nginx
---
# Staging ClusterIssuer for testing (to avoid Let's Encrypt rate limits)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app: ai-orchestrator
spec:
  acme:
    # Let's Encrypt staging server
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
