---
# KEDA ScaledObject for Worker Autoscaling
# Scales worker deployment based on Celery queue depth
# Requires KEDA operator to be installed in the cluster
# Install KEDA: https://keda.sh/docs/latest/deploy/
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-orchestrator-worker-scaler
  namespace: ai-orchestrator-prod
  labels:
    app: ai-orchestrator
    component: worker
    type: scaler
  annotations:
    description: "Queue-depth autoscaler for Celery workers using KEDA"
spec:
  # Reference to the target deployment
  scaleTargetRef:
    name: ai-orchestrator-worker
    kind: Deployment
  
  # Replica limits
  minReplicaCount: 1
  maxReplicaCount: 20
  
  # Triggers configuration
  triggers:
  - type: redis
    metadata:
      # Redis connection string from secret
      address: "redis-service:6379"
      databaseIndex: "1"  # Celery broker uses DB 1
      listName: "celery"  # Celery default queue name
      listLength: "30"    # Target queue depth
      auth: redis-password
      passwordFromSecret:
        name: ai-orchestrator-secrets
        key: REDIS_AUTH_PASSWORD
      dbIndex: "1"
    
    # Activation value - scale to 0 if below this threshold
    authModes:
      - "password"
  
  # Fallback metric if KEDA cannot reach the trigger
  fallbacks:
    - isActive: false
  
  # Scaling behavior
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
          - type: Percent
            value: 50
            periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 5
            periodSeconds: 60
          selectPolicy: Max
  
  # Polling interval and cooldown
  pollingInterval: 30
  cooldownPeriod: 300
