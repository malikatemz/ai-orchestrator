    name: orchestrator-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# HPA for Frontend based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestrator-frontend-hpa
  namespace: orchestrator-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
