---
# Sealed Secrets (for production secret management)
# Install: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.18.0/controller.yaml
# Encrypt: echo -n "secret-value" | kubeseal -n orchestrator-prod -o yaml --from-file=/dev/stdin

apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  namespace: orchestrator-prod
type: Opaque
stringData:
  # Database
  DATABASE_URL: "{postgresql://user:password@postgres:5432/orchestrator}"
  DB_NAME: "{orchestrator}"
  DB_USER: "{orchestrator}"
  DB_PASSWORD: "{generate-strong-password}"
  
  # Redis
  REDIS_URL: "{redis://redis:6379}"
  
  # API Keys
  OPENAI_API_KEY: "{your-openai-api-key}"
  ANTHROPIC_API_KEY: "{your-anthropic-api-key}"
  MISTRAL_API_KEY: "{your-mistral-api-key}"
  
  # Billing
  STRIPE_SECRET_KEY: "{your-stripe-secret-key}"
  STRIPE_WEBHOOK_SECRET: "{your-stripe-webhook-secret}"
  
  # Authentication
  JWT_SECRET_KEY: "{generate-strong-secret}"
  
  # OAuth
  GOOGLE_CLIENT_ID: "{your-google-client-id}"
  GOOGLE_CLIENT_SECRET: "{your-google-client-secret}"
  GITHUB_CLIENT_ID: "{your-github-client-id}"
  GITHUB_CLIENT_SECRET: "{your-github-client-secret}"
