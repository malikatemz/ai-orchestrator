---
# API Deployment - FastAPI Application
# Production-grade deployment with comprehensive health checks,
# resource management, and security best practices.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator-api
  namespace: ai-orchestrator-prod
  labels:
    app: ai-orchestrator
    component: api
    tier: application
    version: v1
  annotations:
    description: "FastAPI application for AI Orchestrator platform"
    managed-by: "kubernetes"
spec:
  replicas: 1  # Will be scaled by HPA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  selector:
    matchLabels:
      app: ai-orchestrator
      component: api
  template:
    metadata:
      labels:
        app: ai-orchestrator
        component: api
        tier: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: api-service-account
      terminationGracePeriodSeconds: 30
      
      # Security context for pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init containers for setup
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.35
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for database..."
              until nc -z postgres-service 5432; do
                echo "Database unavailable - sleeping"
                sleep 2
              done
              echo "Database is up!"
              
              echo "Waiting for Redis..."
              until nc -z redis-service 6379; do
                echo "Redis unavailable - sleeping"
                sleep 2
              done
              echo "Redis is up!"

      containers:
      - name: api
        image: ai-orchestrator:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Environment variables from ConfigMap
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: LOG_LEVEL
        - name: API_TITLE
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: API_TITLE
        - name: API_VERSION
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: API_VERSION
        - name: DATABASE_POOL_SIZE
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: DATABASE_POOL_SIZE
        - name: DATABASE_POOL_RECYCLE
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: DATABASE_POOL_RECYCLE
        - name: REDIS_POOL_SIZE
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: REDIS_POOL_SIZE
        - name: JWT_EXPIRATION_HOURS
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: JWT_EXPIRATION_HOURS
        
        # Environment variables from Secrets
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: REDIS_URL
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: JWT_SECRET_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: OPENAI_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        
        # Command override
        command:
          - "uvicorn"
        args:
          - "app.main:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--log-level"
          - "info"
        
        # Resource management
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        # Liveness probe - ensures container is alive
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - ensures container is ready to receive traffic
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe - waits for app to fully start
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30  # 30 * 5 = 150 seconds max startup time
        
        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      # Affinity and topology spread
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ai-orchestrator
                - key: component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
      
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: ai-orchestrator
            component: api
