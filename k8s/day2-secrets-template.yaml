# SECURITY BEST PRACTICES FOR SECRETS:
#
# 1. STORAGE:
#    - Use HashiCorp Vault, AWS Secrets Manager, or similar for production
#    - Never commit secrets to Git (add .env to .gitignore)
#    - Use encrypted values in configuration management
#
# 2. ACCESS CONTROL:
#    - Restrict read access to secrets via RBAC
#    - Only service accounts and admins should have secret access
#    - Audit all secret access
#
# 3. ROTATION:
#    - Rotate JWT secrets every 90 days
#    - Rotate database passwords every 90 days
#    - Rotate API keys every 6 months
#
# 4. ENCRYPTION:
#    - Enable etcd encryption at rest (K8s setting)
#    - Use TLS for all secret transmission
#    - Encrypt backups containing secrets
#
# 5. MONITORING:
#    - Alert on failed authentication attempts
#    - Alert on unusual API key usage
#    - Log all secret access (excluding values)
#
# 6. FOR DEVELOPMENT:
#    - Use different secrets for dev/staging/prod
#    - Use throw-away API keys for testing
#    - Rotate test keys frequently
