# EXAMPLE SECRET CREATION SCRIPT (save as create-secrets.sh)
#!/bin/bash
# Create AI Orchestrator secrets in Kubernetes
# Usage: ./create-secrets.sh <namespace>

NAMESPACE="${1:-ai-orchestrator-prod}"

echo "Creating secrets in namespace: $NAMESPACE"

# Ensure namespace exists
kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

# Create secret from environment file
# First, create a .env file with all secrets
# Then run: kubectl create secret generic ai-orchestrator-secrets \
#   --from-env-file=.env \
#   --namespace="$NAMESPACE"

# For now, use literal values (replace with actual values)
kubectl create secret generic ai-orchestrator-secrets \
  --from-literal=DATABASE_URL="postgresql://postgres:postgres@postgres-service:5432/ai_orchestrator" \
  --from-literal=REDIS_URL="redis://:redis-password@redis-service:6379/0" \
  --from-literal=JWT_SECRET_KEY="$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')" \
  --from-literal=CELERY_BROKER_URL="redis://:redis-password@redis-service:6379/1" \
  --from-literal=CELERY_RESULT_BACKEND="redis://:redis-password@redis-service:6379/2" \
  --from-literal=OPENAI_API_KEY="sk-replace-with-actual-key" \
  --from-literal=ANTHROPIC_API_KEY="sk-ant-replace-with-actual-key" \
  --from-literal=POSTGRES_PASSWORD="postgres" \
  --from-literal=POSTGRES_USER="postgres" \
  --from-literal=REDIS_AUTH_PASSWORD="redis-password" \
  --namespace="$NAMESPACE" \
  --dry-run=client -o yaml | kubectl apply -f -

echo "Secret 'ai-orchestrator-secrets' created/updated in namespace: $NAMESPACE"
echo ""
echo "Verify: kubectl describe secret ai-orchestrator-secrets -n $NAMESPACE"

