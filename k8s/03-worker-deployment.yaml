---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-worker
  namespace: orchestrator-prod
  labels:
    app: orchestrator-worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orchestrator-worker
  template:
    metadata:
      labels:
        app: orchestrator-worker
    spec:
      serviceAccountName: orchestrator-worker
      containers:
      - name: worker
        image: ghcr.io/{ORG}/orchestrator-worker:latest
        imagePullPolicy: Always
        command:
        - "celery"
        - "-A"
        - "app.worker"
        - "worker"
        - "--loglevel=info"
        - "-Q"
        - "high_priority,default,low_cost"
        - "--concurrency=4"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: REDIS_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: ANTHROPIC_API_KEY
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: MISTRAL_API_KEY
        - name: CELERY_CONCURRENCY
          value: "4"
        - name: CELERY_QUEUES
          value: "high_priority,default,low_cost"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "celery -A app.worker control graceful_shutdown"]
