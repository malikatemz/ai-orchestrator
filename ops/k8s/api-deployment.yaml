apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-orchestrator-api
  template:
    metadata:
      labels:
        app: ai-orchestrator-api
    spec:
      containers:
        - name: api
          image: your-registry/ai-orchestrator-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_MODE
              value: production
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator-api
spec:
  selector:
    app: ai-orchestrator-api
  ports:
    - port: 8000
      targetPort: 8000
